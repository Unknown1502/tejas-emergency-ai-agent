steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/tejas/frontend:latest'
      - '--build-arg'
      - 'VITE_WS_URL=$_BACKEND_WSS_URL'
      - '.'
    dir: '.'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/tejas/frontend:latest'

substitutions:
  _BACKEND_WSS_URL: ''

timeout: 600s
